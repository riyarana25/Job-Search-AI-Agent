<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Job Search AI Agent{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            accent: {
              50: '#fef2f2', 100: '#fee2e2', 300: '#fca5a5',
              400: '#f6413c', 500: '#e10600', 600: '#c20500', 700: '#970400',
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="text-zinc-900 dark:text-zinc-100 min-h-screen flex flex-col">
  <header class="sticky top-0 z-20 bg-[#e7e8eb]/95 dark:bg-[#08090b]/95 backdrop-blur border-b-2 border-zinc-900 dark:border-zinc-200">
    <div class="np-flag-strip-full"></div>
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-6 flex-wrap">
      <div class="flex items-center gap-2.5 np-enter">
        <div class="text-xl font-bold tracking-tight">
          job<span class="np-pop inline-block bg-[#e10600] text-white px-1.5 border-2 rounded-lg -rotate-2">agent</span>
        </div>
        <span class="hidden sm:inline text-xs font-medium text-zinc-500 dark:text-zinc-400">Self-hosted job search</span>
      </div>
      <nav class="np-tabbar np-enter" style="animation-delay: 60ms">
        {% set path = request.url.path %}
        <a href="/" class="np-tab {% if path == '/' %}np-tab-active{% else %}text-zinc-600 dark:text-zinc-300{% endif %}">
          🏁 Dashboard
        </a>
        <a href="/profile" class="np-tab {% if path == '/profile' %}np-tab-active{% else %}text-zinc-600 dark:text-zinc-300{% endif %}">
          🪖 Profile
        </a>
        <a href="/companies" class="np-tab {% if path == '/companies' %}np-tab-active{% else %}text-zinc-600 dark:text-zinc-300{% endif %}">
          🏢 Companies
        </a>
      </nav>
    </div>
  </header>

  <main class="flex-1 min-w-0 px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs font-medium text-zinc-400 py-6">
    v0.2 · local only
  </footer>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
