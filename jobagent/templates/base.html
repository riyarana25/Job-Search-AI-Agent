<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Job Search AI Agent{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            accent: {
              50: '#eef2ff', 100: '#e0e7ff', 400: '#818cf8',
              500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">
  <div class="flex min-h-screen">
    <aside class="w-60 shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col">
      <div class="px-6 py-5 border-b border-slate-200 dark:border-slate-800">
        <div class="text-lg font-semibold tracking-tight">JobAgent</div>
        <div class="text-xs text-slate-500 dark:text-slate-400">self-hosted job search</div>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        {% set path = request.url.path %}
        <a href="/" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
          {% if path == '/' %}bg-accent-50 text-accent-700 dark:bg-accent-500/10 dark:text-accent-400{% else %}text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800{% endif %}">
          <span>📋</span> Dashboard
        </a>
        <a href="/profile" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
          {% if path == '/profile' %}bg-accent-50 text-accent-700 dark:bg-accent-500/10 dark:text-accent-400{% else %}text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800{% endif %}">
          <span>🧑</span> Profile
        </a>
        <a href="/companies" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium
          {% if path == '/companies' %}bg-accent-50 text-accent-700 dark:bg-accent-500/10 dark:text-accent-400{% else %}text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800{% endif %}">
          <span>🏢</span> Companies
        </a>
      </nav>
      <div class="px-6 py-4 border-t border-slate-200 dark:border-slate-800 text-xs text-slate-400">
        v0.2 &middot; local only
      </div>
    </aside>

    <main class="flex-1 min-w-0 p-8">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
